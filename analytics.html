{% extends "base.html" %}
{% block title %}Analytics — SmartCampus{% endblock %}
{% block page_title %}Analytics Dashboard{% endblock %}
{% block content %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
  <div class="card">
    <div class="card-header"><h3><i class="fas fa-tags" style="color:var(--blue-500);margin-right:8px;"></i>Issues by Category</h3></div>
    <div class="card-body"><canvas id="categoryChart" height="230"></canvas></div>
  </div>
  <div class="card">
    <div class="card-header"><h3><i class="fas fa-circle-dot" style="color:var(--blue-400);margin-right:8px;"></i>Status Distribution</h3></div>
    <div class="card-body"><canvas id="statusChart" height="230"></canvas></div>
  </div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
  <div class="card">
    <div class="card-header"><h3><i class="fas fa-exclamation-triangle" style="color:#D97706;margin-right:8px;"></i>Issues by Priority</h3></div>
    <div class="card-body"><canvas id="priorityChart" height="210"></canvas></div>
  </div>
  <div class="card">
    <div class="card-header"><h3><i class="fas fa-chart-line" style="color:var(--blue-600);margin-right:8px;"></i>Monthly Trend</h3></div>
    <div class="card-body"><canvas id="monthlyChart" height="210"></canvas></div>
  </div>
</div>

<div class="card">
  <div class="card-header"><h3><i class="fas fa-map-marker-alt" style="color:#DC2626;margin-right:8px;"></i>Top Issue Locations</h3></div>
  <div class="card-body">
    <div id="locationsChart"></div>
    <script>
    const locData = {{ by_location | safe }};
    const locContainer = document.getElementById('locationsChart');
    if (!locData.length) {
      locContainer.innerHTML = '<div class="empty-state" style="padding:30px;"><i class="fas fa-map"></i><h3>No location data yet</h3></div>';
    } else {
      const maxCount = locData[0].count;
      locContainer.innerHTML = '<div style="display:flex;flex-direction:column;gap:13px;">' +
        locData.map(item => `
          <div style="display:flex;align-items:center;gap:14px;">
            <div style="width:180px;font-size:13px;font-weight:600;color:#0F1D3D;flex-shrink:0;">${item.location}</div>
            <div style="flex:1;background:#EFF6FF;border-radius:6px;height:9px;overflow:hidden;border:1px solid #DBEAFE;">
              <div style="width:${Math.round(item.count/maxCount*100)}%;background:linear-gradient(90deg,#1A56C4,#3B82F6);height:100%;border-radius:6px;"></div>
            </div>
            <div style="width:28px;text-align:right;font-size:13px;font-weight:700;color:#1A56C4;">${item.count}</div>
          </div>`).join('') + '</div>';
    }
    </script>
  </div>
</div>

<script>
const categoryData = {{ by_category | safe }};
const statusData   = {{ by_status | safe }};
const priorityData = {{ by_priority | safe }};
const monthlyData  = {{ monthly | safe }};

const blues = ['#1A56C4','#2563EB','#3B82F6','#60A5FA','#93C5FD','#BFDBFE','#0D2B5E','#1040A0'];

Chart.defaults.font.family = 'Inter, sans-serif';
Chart.defaults.font.size = 12;
Chart.defaults.color = '#4A5F8A';

// Category
new Chart(document.getElementById('categoryChart'), {
  type: 'bar',
  data: {
    labels: categoryData.map(d => d.category),
    datasets: [{
      label: 'Issues', data: categoryData.map(d => d.count),
      backgroundColor: blues, borderRadius: 7, borderSkipped: false
    }]
  },
  options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: '#EFF6FF' } }, x: { grid: { display: false } } } }
});

// Status Doughnut
const statusColors = { 'Open': '#1A56C4', 'In Progress': '#D97706', 'Resolved': '#059669', 'Closed': '#9CA3AF' };
new Chart(document.getElementById('statusChart'), {
  type: 'doughnut',
  data: {
    labels: statusData.map(d => d.status),
    datasets: [{ data: statusData.map(d => d.count), backgroundColor: statusData.map(d => statusColors[d.status] || '#888'), borderWidth: 3, borderColor: '#fff' }]
  },
  options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true } } }, cutout: '68%' }
});

// Priority Horizontal Bar
const priorColors = { 'High': '#DC2626', 'Medium': '#D97706', 'Low': '#059669' };
new Chart(document.getElementById('priorityChart'), {
  type: 'bar',
  data: {
    labels: priorityData.map(d => d.priority),
    datasets: [{ label: 'Issues', data: priorityData.map(d => d.count), backgroundColor: priorityData.map(d => priorColors[d.priority] || '#888'), borderRadius: 7, borderSkipped: false }]
  },
  options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: '#EFF6FF' } }, y: { grid: { display: false } } } }
});

// Monthly Line
new Chart(document.getElementById('monthlyChart'), {
  type: 'line',
  data: {
    labels: [...monthlyData].reverse().map(d => d.month),
    datasets: [{
      label: 'Issues', data: [...monthlyData].reverse().map(d => d.count),
      borderColor: '#1A56C4', backgroundColor: 'rgba(26,86,196,0.07)',
      tension: 0.4, fill: true, pointBackgroundColor: '#1A56C4',
      pointBorderColor: '#fff', pointBorderWidth: 2, pointRadius: 5
    }]
  },
  options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: '#EFF6FF' } }, x: { grid: { display: false } } } }
});
</script>
{% endblock %}
